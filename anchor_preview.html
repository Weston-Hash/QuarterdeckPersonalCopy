<!DOCTYPE html>
<html>
<head><style>
  body { background:#333; display:flex; gap:2rem; padding:2rem; align-items:center; }
  .box40  { width:40px;  height:40px;  background:#BF5700; border-radius:6px;  display:grid; place-items:center; }
  .box56  { width:56px;  height:56px;  background:#BF5700; border-radius:10px; display:grid; place-items:center; }
  .box120 { width:120px; height:120px; background:#BF5700; border-radius:18px; display:grid; place-items:center; }
</style></head>
<body>

<!-- Topbar size -->
<div class="box40">
  <svg viewBox="0 0 100 125" fill="white" xmlns="http://www.w3.org/2000/svg" style="width:80%;height:80%">
    <circle cx="50" cy="12" r="9" fill="none" stroke="white" stroke-width="5.5"/>
    <rect x="45" y="20" width="10" height="68"/>
    <rect x="2" y="34" width="96" height="9" rx="4.5"/>
    <path d="M4,87 L10,76 L18,85 A33,15,0,0,0,82,85 L90,76 L96,87 A47,28,0,0,1,4,87 Z"/>
  </svg>
</div>

<!-- Login mark size -->
<div class="box56">
  <svg viewBox="0 0 100 125" fill="white" xmlns="http://www.w3.org/2000/svg" style="width:80%;height:80%">
    <circle cx="50" cy="12" r="9" fill="none" stroke="white" stroke-width="5.5"/>
    <rect x="45" y="20" width="10" height="68"/>
    <rect x="2" y="34" width="96" height="9" rx="4.5"/>
    <path d="M4,87 L10,76 L18,85 A33,15,0,0,0,82,85 L90,76 L96,87 A47,28,0,0,1,4,87 Z"/>
  </svg>
</div>

<!-- Large preview -->
<div class="box120">
  <svg viewBox="0 0 100 125" fill="white" xmlns="http://www.w3.org/2000/svg" style="width:80%;height:80%">
    <circle cx="50" cy="12" r="9" fill="none" stroke="white" stroke-width="5.5"/>
    <rect x="45" y="20" width="10" height="68"/>
    <rect x="2" y="34" width="96" height="9" rx="4.5"/>
    <path d="M4,87 L10,76 L18,85 A33,15,0,0,0,82,85 L90,76 L96,87 A47,28,0,0,1,4,87 Z"/>
  </svg>
</div>

</body>
</html>
